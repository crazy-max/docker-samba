name: test

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  push:
    branches:
      - 'master'
  pull_request:

env:
  BUILD_TAG: samba:test
  CONTAINER_NAME: samba

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      -
        name: Build
        uses: docker/bake-action@82490499d2e5613fcead7e128237ef0b0ea210f7 # v7.0.0
        with:
          source: .
          targets: image-local
        env:
          DEFAULT_TAG: ${{ env.BUILD_TAG }}
      -
        name: Start
        run: |
          docker compose up -d
        working-directory: test
        env:
          SAMBA_IMAGE: ${{ env.BUILD_TAG }}
          SAMBA_CONTAINER: ${{ env.CONTAINER_NAME }}
      -
        name: Check container logs
        uses: crazy-max/.github/.github/actions/container-logs-check@bbd31df64ee0f097a02f12495f541f9236f18c46 # v1.2.0
        with:
          container_name: ${{ env.CONTAINER_NAME }}
          log_check: " started."
          timeout: 20
      -
        name: Dump smb.conf
        run: |
          docker compose exec ${{ env.CONTAINER_NAME }} cat /etc/samba/smb.conf
        working-directory: test
        env:
          SAMBA_IMAGE: ${{ env.BUILD_TAG }}
          SAMBA_CONTAINER: ${{ env.CONTAINER_NAME }}
      -
        name: Logs
        if: always()
        run: |
          docker compose logs
        working-directory: test
        env:
          SAMBA_IMAGE: ${{ env.BUILD_TAG }}
          SAMBA_CONTAINER: ${{ env.CONTAINER_NAME }}
