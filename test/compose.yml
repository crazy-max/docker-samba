name: samba

services:
  samba:
    image: ${SAMBA_IMAGE:-crazymax/samba}
    container_name: ${SAMBA_CONTAINER:-samba}
    hostname: docker_samba
    network_mode: host
    cap_add:
      - CAP_NET_ADMIN
      - CAP_NET_RAW
    volumes:
      - "./data:/data"
      - "./public:/samba/public"
      - "./share:/samba/share"
      - "./foo:/samba/foo"
      - "./foo-baz:/samba/foo-baz"
      - "./yyy_password:/tmp/yyy_password:ro"
    environment:
      - "TZ=Europe/Paris"
      - "BROWSABLE=yes"
      - "AVAHI_ENABLE=1"
      - "WSDD2_ENABLE=1"
      - "WSDD2_NETBIOS_NAME=docker_samba"
    restart: always
